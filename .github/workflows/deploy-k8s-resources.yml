name: Deploy K8s Resources

on:
  workflow_dispatch:
    inputs:
      deploy_rbac:
        description: 'Deploy RBAC resources'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_configmaps:
        description: 'Deploy ConfigMaps'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_pvcs:
        description: 'Deploy PersistentVolumeClaims'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_services:
        description: 'Deploy Services'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_ingresses:
        description: 'Deploy Ingresses'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_statefulsets:
        description: 'Deploy StatefulSets'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_daemonsets:
        description: 'Deploy DaemonSets'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_deployments:
        description: 'Deploy Deployments (includes image updates)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_all:
        description: 'Deploy ALL resources (overrides individual selections)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches:
      - main
      - master
    paths:
      - 'k8s/charts/templates/**'
      - '.github/workflows/deploy-k8s-resources.yml'

permissions:
  contents: read

jobs:
  deploy-k8s-resources:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'
      
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          
          # Verify connection
          kubectl cluster-info
          kubectl get nodes
      
      - name: Verify namespace exists
        run: |
          if ! kubectl get namespace axric >/dev/null 2>&1; then
            echo "Creating namespace: axric"
            kubectl create namespace axric
          else
            echo "Namespace axric already exists"
          fi
      
      - name: Show deployment plan
        run: |
          echo "=========================================="
          echo "Deployment Configuration:"
          echo "=========================================="
          echo "Deploy All: ${{ github.event.inputs.deploy_all || 'false' }}"
          echo "Deploy RBAC: ${{ github.event.inputs.deploy_rbac || 'false' }}"
          echo "Deploy ConfigMaps: ${{ github.event.inputs.deploy_configmaps || 'false' }}"
          echo "Deploy PVCs: ${{ github.event.inputs.deploy_pvcs || 'false' }}"
          echo "Deploy Services: ${{ github.event.inputs.deploy_services || 'false' }}"
          echo "Deploy Ingresses: ${{ github.event.inputs.deploy_ingresses || 'false' }}"
          echo "Deploy StatefulSets: ${{ github.event.inputs.deploy_statefulsets || 'false' }}"
          echo "Deploy DaemonSets: ${{ github.event.inputs.deploy_daemonsets || 'false' }}"
          echo "Deploy Deployments (Images): ${{ github.event.inputs.deploy_deployments || 'true' }}"
          echo "=========================================="
      
      - name: Apply RBAC resources
        if: ${{ (github.event.inputs.deploy_all || 'false') == 'true' || (github.event.inputs.deploy_rbac || 'false') == 'true' }}
        run: |
          echo "Applying RBAC resources..."
          kubectl apply -R -f k8s/charts/templates/rbac/ -n axric 2>/dev/null || true
      
      - name: Apply ConfigMaps
        if: ${{ (github.event.inputs.deploy_all || 'false') == 'true' || (github.event.inputs.deploy_configmaps || 'false') == 'true' }}
        run: |
          echo "Applying ConfigMaps..."
          kubectl apply -R -f k8s/charts/templates/configmaps/ -n axric 2>/dev/null || true
      
      - name: Apply PersistentVolumeClaims
        if: ${{ (github.event.inputs.deploy_all || 'false') == 'true' || (github.event.inputs.deploy_pvcs || 'false') == 'true' }}
        run: |
          echo "Applying PersistentVolumeClaims..."
          kubectl apply -R -f k8s/charts/templates/pvcs/ -n axric 2>/dev/null || true
      
      - name: Apply Services
        if: ${{ (github.event.inputs.deploy_all || 'false') == 'true' || (github.event.inputs.deploy_services || 'false') == 'true' }}
        run: |
          echo "Applying Services..."
          kubectl apply -R -f k8s/charts/templates/services/ -n axric 2>/dev/null || true
      
      - name: Apply Ingresses
        if: ${{ (github.event.inputs.deploy_all || 'false') == 'true' || (github.event.inputs.deploy_ingresses || 'false') == 'true' }}
        run: |
          echo "Applying Ingresses..."
          kubectl apply -R -f k8s/charts/templates/ingresses/ -n axric 2>/dev/null || true
      
      - name: Apply StatefulSets
        if: ${{ (github.event.inputs.deploy_all || 'false') == 'true' || (github.event.inputs.deploy_statefulsets || 'false') == 'true' }}
        run: |
          echo "Applying StatefulSets..."
          kubectl apply -R -f k8s/charts/templates/statefulsets/ -n axric 2>/dev/null || true
      
      - name: Apply DaemonSets
        if: ${{ (github.event.inputs.deploy_all || 'false') == 'true' || (github.event.inputs.deploy_daemonsets || 'false') == 'true' }}
        run: |
          echo "Applying DaemonSets..."
          kubectl apply -R -f k8s/charts/templates/daemonsets/ -n axric 2>/dev/null || true
      
      - name: Apply Helm Chart (Deployments with templates)
        if: ${{ (github.event.inputs.deploy_all || 'false') == 'true' || (github.event.inputs.deploy_deployments || 'true') == 'true' }}
        run: |
          echo "Installing/Upgrading Helm Chart..."

          # Adopt all existing resources in the namespace so Helm can manage them
          for resource in serviceaccounts configmaps services deployments statefulsets daemonsets ingresses persistentvolumeclaims; do
            kubectl get $resource -n axric -o name 2>/dev/null | while read name; do
              kubectl label $name -n axric app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true
              kubectl annotate $name -n axric \
                meta.helm.sh/release-name=axric-release \
                meta.helm.sh/release-namespace=axric \
                --overwrite 2>/dev/null || true
            done
          done

          helm upgrade --install axric-release ./k8s/charts \
            --namespace axric \
            --values k8s/charts/values.yaml \
            --force \
            --wait \
            --timeout 5m
      
      - name: Verify deployment
        run: |
          echo "===== Deployment Status ====="
          kubectl get all -n axric
          echo ""
          echo "===== ConfigMaps ====="
          kubectl get configmaps -n axric
          echo ""
          echo "===== Services ====="
          kubectl get svc -n axric
          echo ""
          echo "===== Ingresses ====="
          kubectl get ingress -n axric
          echo ""
          echo "===== Pod Status ====="
          kubectl get pods -n axric -o wide
      
      - name: Wait for deployments to be ready
        run: |
          echo "Waiting for deployments to be ready..."
          kubectl rollout status deployment -n axric --timeout=5m || true
          echo "Deployment completed or timed out"
