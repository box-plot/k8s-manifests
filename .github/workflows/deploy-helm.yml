name: Deploy Helm Chart

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'k8s/charts/**'
      - '.github/workflows/deploy-helm.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    #environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          
          # Verify connection
          kubectl cluster-info
          kubectl get nodes

      - name: Deploy Helm Chart
        run: |
          set -euo pipefail
          
          # Load values.yaml to get image versions
          export NAMESPACE=$(yq eval '.namespace' k8s/charts/values.yaml)
          
          echo "Deploying to namespace: $NAMESPACE"
          
          # Create namespace if it doesn't exist
          kubectl get ns "$NAMESPACE" >/dev/null 2>&1 || kubectl create ns "$NAMESPACE"
          
          # Deploy using Helm
          helm upgrade --install k8s-export k8s/charts \
            --namespace "$NAMESPACE" \
            --values k8s/charts/values.yaml \
            --wait \
            --timeout 5m
          
          echo "Helm deployment completed!"

      - name: Verify deployment
        run: |
          set -euo pipefail
          
          export NAMESPACE=$(yq eval '.namespace' k8s/charts/values.yaml)
          
          echo "Verifying deployments in namespace: $NAMESPACE"
          
          # Get deployment status
          kubectl get deployments -n "$NAMESPACE" -o wide
          
          echo ""
          echo "Pod status:"
          kubectl get pods -n "$NAMESPACE" -o wide
          
          # Wait for rollout
          kubectl rollout status deployment -n "$NAMESPACE" --timeout=5m || true
          
          echo ""
          echo "Deployment verification completed!"

      - name: Get deployment summary
        run: |
          export NAMESPACE=$(yq eval '.namespace' k8s/charts/values.yaml)
          
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Release**: k8s-export" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace**: $NAMESPACE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Deployments" >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -n "$NAMESPACE" -o jsonpath='{range .items[*]}{.metadata.name}{" - "}{.spec.replicas}{" replicas - Image: "}{.spec.template.spec.containers[0].image}{"\n"}{end}' >> $GITHUB_STEP_SUMMARY || echo "No deployments" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pod Status" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n "$NAMESPACE" -o jsonpath='{range .items[*]}{.metadata.name}{" - "}{.status.phase}{"\n"}{end}' >> $GITHUB_STEP_SUMMARY || echo "No pods" >> $GITHUB_STEP_SUMMARY
