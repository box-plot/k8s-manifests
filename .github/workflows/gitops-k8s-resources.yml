name: GitOps Update Image Version

on:
  repository_dispatch:
    types: [deployment-app]

permissions:
  contents: write

jobs:
  update-image-version:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from dispatch
        id: version
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          if [ -z "$VERSION" ]; then
            echo "::error::Version not provided in repository_dispatch payload"
            exit 1
          fi
          echo "NEW_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Deploying version: $VERSION"

      - name: Install yq
        run: |
          set -euo pipefail
          YQ_VERSION="v4.44.3"
          sudo wget -q -O /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image versions in values.yaml
        run: |
          set -euo pipefail
          VALUES_FILE="k8s/charts/values.yaml"
          VERSION="${{ steps.version.outputs.NEW_VERSION }}"
          DOCKER_USER="${{ secrets.DOCKERHUB_USERNAME }}"

          echo "Updating image versions to $VERSION..."

          # Update axric-api image
          yq eval ".apps.axric-api.image = \"$DOCKER_USER/axric-api:$VERSION\"" -i "$VALUES_FILE"
          
          # Update axric-fe image
          yq eval ".apps.axric-fe.image = \"$DOCKER_USER/axric-fe:$VERSION\"" -i "$VALUES_FILE"

          echo "Updated values.yaml with new versions"
          cat "$VALUES_FILE" | grep -A 1 "image:"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if [[ -z $(git status -s) ]]; then
            echo "No changes to commit"
            exit 0
          fi

          git add k8s/charts/values.yaml
          git commit -m "chore: Update image versions to ${{ steps.version.outputs.NEW_VERSION }}"
          git push

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.NEW_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Argo CD will automatically sync the new image versions." >> $GITHUB_STEP_SUMMARY