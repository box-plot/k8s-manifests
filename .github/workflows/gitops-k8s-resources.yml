name: GitOps K8s Resources to Helm

on:
  workflow_dispatch:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  export-k8s-resources:
    runs-on: ubuntu-latest
    env:
      # Namespaces to export (space-separated)
      EXPORT_NAMESPACES: "axric"
      # GitOps-safe defaults for Argo CD
      EXPORT_SECRETS: "false"
      EXPORT_CLUSTER_RBAC: "false"
      EXPORT_CUSTOM_RESOURCES: "false"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'
      
      - name: Configure kubectl
        run: |
          # Create kubeconfig from secrets
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          
          # Verify connection
          kubectl cluster-info
          kubectl get nodes
      
      - name: Install yq for manifest cleanup
        run: |
          set -euo pipefail
          YQ_VERSION="v4.44.3"
          sudo wget -q -O /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Export resources (Argo CD friendly)
        run: |
          set -euo pipefail

          mkdir -p k8s/charts/templates/{deployments,configmaps,secrets,services,ingresses,statefulsets,daemonsets,pvcs,rbac,custom-resources}

          sanitize_manifest() {
            local file="$1"
            if [ ! -s "$file" ]; then
              rm -f "$file"
              return
            fi

            yq eval '
              del(
                .metadata.creationTimestamp,
                .metadata.resourceVersion,
                .metadata.uid,
                .metadata.generation,
                .metadata.managedFields,
                .metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                .metadata.annotations."deployment.kubernetes.io/revision",
                .status,
                .spec.clusterIP,
                .spec.clusterIPs,
                .spec.healthCheckNodePort,
                .spec.ipFamilies,
                .spec.ipFamilyPolicy,
                .spec.internalTrafficPolicy,
                .spec.allocateLoadBalancerNodePorts,
                .spec.sessionAffinityConfig,
                .spec.volumeName
              )
            ' -i "$file"
          }

          export_resource() {
            local resource="$1"
            local target_dir="$2"
            local target_file="$3"

            for ns in $EXPORT_NAMESPACES; do
              if ! kubectl get namespace "$ns" >/dev/null 2>&1; then
                echo "Skipping missing namespace: $ns"
                continue
              fi

              mkdir -p "k8s/charts/templates/${target_dir}/${ns}"
              local output="k8s/charts/templates/${target_dir}/${ns}/${target_file}"
              local tmp_json
              tmp_json=$(mktemp)

              if ! kubectl get "$resource" -n "$ns" -o json > "$tmp_json" 2>/dev/null; then
                rm -f "$tmp_json" "$output"
                continue
              fi

              if [ "$(jq '.items | length' "$tmp_json")" -eq 0 ]; then
                rm -f "$tmp_json" "$output"
                continue
              fi

              jq -c '.items[]' "$tmp_json" | while read -r item; do
                echo "$item" | yq -P e '.' -
                echo "---"
              done > "$output"

              rm -f "$tmp_json"
              sanitize_manifest "$output"
            done
          }

          echo "====================================="
          echo "K8s Export Configuration"
          echo "====================================="
          echo "Namespaces: $EXPORT_NAMESPACES"
          echo "Export secrets: $EXPORT_SECRETS"
          echo "Export cluster RBAC: $EXPORT_CLUSTER_RBAC"
          echo "Export custom resources: $EXPORT_CUSTOM_RESOURCES"
          echo "====================================="

          echo "Skipping raw deployment export to preserve Helm-templated deployments"
          export_resource statefulsets statefulsets statefulsets.yaml
          export_resource daemonsets daemonsets daemonsets.yaml
          export_resource configmaps configmaps configmaps.yaml
          export_resource services services services.yaml
          export_resource ingresses ingresses ingresses.yaml
          export_resource pvc pvcs pvcs.yaml
          export_resource roles rbac roles.yaml
          export_resource rolebindings rbac rolebindings.yaml
          export_resource serviceaccounts rbac serviceaccounts.yaml

          if [ "$EXPORT_SECRETS" = "true" ]; then
            export_resource secrets secrets secrets.yaml
          else
            rm -rf k8s/charts/templates/secrets/*
            echo "Secret export skipped (EXPORT_SECRETS=false)"
          fi

          if [ "$EXPORT_CLUSTER_RBAC" = "true" ]; then
            kubectl get clusterroles -o yaml > k8s/charts/templates/rbac/clusterroles.yaml 2>/dev/null || true
            kubectl get clusterrolebindings -o yaml > k8s/charts/templates/rbac/clusterrolebindings.yaml 2>/dev/null || true
            sanitize_manifest k8s/charts/templates/rbac/clusterroles.yaml
            sanitize_manifest k8s/charts/templates/rbac/clusterrolebindings.yaml
          else
            rm -f k8s/charts/templates/rbac/clusterroles.yaml k8s/charts/templates/rbac/clusterrolebindings.yaml
            echo "Cluster RBAC export skipped (EXPORT_CLUSTER_RBAC=false)"
          fi

          if [ "$EXPORT_CUSTOM_RESOURCES" = "true" ]; then
            for crd in $(kubectl get crd -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              mkdir -p "k8s/charts/templates/custom-resources/$crd"
              if kubectl get "$crd" -A -o yaml > "k8s/charts/templates/custom-resources/$crd/$crd.yaml" 2>/dev/null; then
                sanitize_manifest "k8s/charts/templates/custom-resources/$crd/$crd.yaml"
              fi
            done
          else
            rm -rf k8s/charts/templates/custom-resources/*
            echo "Custom resource export skipped (EXPORT_CUSTOM_RESOURCES=false)"
          fi
      
      - name: Create Helm Chart Structure
        run: |
          cat > k8s/charts/Chart.yaml << 'EOF'
          apiVersion: v2
          name: k8s-export
          description: Exported Kubernetes resources as Helm chart
          type: application
          version: 1.0.0
          appVersion: "1.0"
          keywords:
            - kubernetes
            - export
            - manifests
          maintainers:
            - name: DevOps Team
              email: jaronthongfoo@gmail.com
          EOF
      
      - name: Sync image tags from cluster into values.yaml
        run: |
          set -euo pipefail
          VALUES_FILE="k8s/charts/values.yaml"

          echo "Reading live deployment images from cluster..."

          for ns in $EXPORT_NAMESPACES; do
            kubectl get deployments -n "$ns" -o json 2>/dev/null | \
            jq -r '.items[] | "\(.metadata.name) \(.spec.template.spec.containers[0].image)"' | \
            while read -r dep_name image; do
              # Find matching app key in values.yaml by app name
              app_key=$(yq eval '.apps | to_entries | .[] | select(.value.name == "'"$dep_name"'") | .key' "$VALUES_FILE" 2>/dev/null || true)

              if [ -n "$app_key" ]; then
                current_image=$(yq eval ".apps.${app_key}.image" "$VALUES_FILE")
                if [ "$current_image" != "$image" ]; then
                  echo "Updating apps.${app_key}.image: $current_image -> $image"
                  yq -i ".apps.${app_key}.image = \"${image}\"" "$VALUES_FILE"
                else
                  echo "apps.${app_key}.image unchanged: $image"
                fi
              else
                echo "No matching app key found in values.yaml for deployment: $dep_name"
              fi
            done
          done
      
      - name: Create Helm helpers template
        run: |
          cat > k8s/charts/templates/_helpers.tpl << 'EOF'
          {{/*
          Expand the name of the chart.
          */}}
          {{- define "k8s-export.name" -}}
          {{- default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" }}
          {{- end }}
          
          {{/*
          Create a default fully qualified app name.
          */}}
          {{- define "k8s-export.fullname" -}}
          {{- if .Values.fullnameOverride }}
          {{- .Values.fullnameOverride | trunc 63 | trimSuffix "-" }}
          {{- else }}
          {{- $name := default .Chart.Name .Values.nameOverride }}
          {{- if contains $name .Release.Name }}
          {{- .Release.Name | trunc 63 | trimSuffix "-" }}
          {{- else }}
          {{- printf "%s-%s" .Release.Name $name | trunc 63 | trimSuffix "-" }}
          {{- end }}
          {{- end }}
          {{- end }}
          
          {{/*
          Create chart name and version as used by the chart label.
          */}}
          {{- define "k8s-export.chart" -}}
          {{- printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
          {{- end }}
          
          {{/*
          Common labels
          */}}
          {{- define "k8s-export.labels" -}}
          helm.sh/chart: {{ include "k8s-export.chart" . }}
          {{ include "k8s-export.selectorLabels" . }}
          {{- if .Chart.AppVersion }}
          app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
          {{- end }}
          app.kubernetes.io/managed-by: {{ .Release.Service }}
          {{- end }}
          
          {{/*
          Selector labels
          */}}
          {{- define "k8s-export.selectorLabels" -}}
          app.kubernetes.io/name: {{ include "k8s-export.name" . }}
          app.kubernetes.io/instance: {{ .Release.Name }}
          {{- end }}
          EOF
      
      - name: Create README
        run: |
          cat > k8s/README.md << 'EOF'
          # Kubernetes Resources Export
          
          This directory contains exported Kubernetes resources as a Helm chart.
          
          ## Directory Structure
          
          - **charts/**: Helm chart with all Kubernetes resources
            - **Chart.yaml**: Helm chart metadata
            - **values.yaml**: Chart configuration
            - **templates/**: Exported Kubernetes manifests organized by resource type and namespace
          
          ### Exported Resource Types
          
          - `deployments/` - Kubernetes Deployments
          - `statefulsets/` - StatefulSets
          - `daemonsets/` - DaemonSets
          - `configmaps/` - ConfigMaps
          - `secrets/` - Secrets
          - `services/` - Services
          - `ingresses/` - Ingress resources
          - `pvcs/` - PersistentVolumeClaims
          - `rbac/` - RBAC resources (Roles, RoleBindings, etc.)
          - `custom-resources/` - Custom Resource Definitions and instances
          
          ## Installation
          
          ### Using Helm
          
          ```bash
          # Install the chart
          helm install k8s-export ./charts
          
          # Upgrade the chart
          helm upgrade k8s-export ./charts
          
          # Install with custom values
          helm install k8s-export ./charts -f custom-values.yaml
          ```
          
          ### Manual deployment
          
          ```bash
          # Apply exported resources directly
          kubectl apply -f charts/templates/deployments/
          kubectl apply -f charts/templates/services/
          # ... and so on
          ```
          
          ## Export Schedule
          
          Resources are automatically exported daily at 2 AM UTC via GitHub Actions workflow.
          
          ## Manual Export
          
          To trigger an export manually:
          
          1. Go to Actions tab in GitHub
          2. Select "Export K8s Resources to Helm" workflow
          3. Click "Run workflow"
          
          ## Requirements
          
          - Valid Kubernetes cluster credentials in `KUBE_CONFIG` secret
          - GitHub Actions enabled
          - Appropriate permissions to read cluster resources
          
          ## Notes
          
          - This workflow removes runtime metadata for GitOps-friendly diffs
          - Secrets are NOT exported by default (`EXPORT_SECRETS=false`)
          - Cluster RBAC and custom resources are disabled by default
          - Set workflow env vars to enable additional resource exports
          
          EOF
      
      - name: Generate inventory
        run: |
          cat > k8s/INVENTORY.md << 'EOF'
          # Kubernetes Resources Inventory
          
          Generated: $(date)
          
          ## Export Statistics
          
          EOF
          
          echo "### Deployments" >> k8s/INVENTORY.md
          find k8s/charts/templates/deployments -name "*.yaml" -exec wc -l {} + | tail -1 >> k8s/INVENTORY.md || echo "0 files" >> k8s/INVENTORY.md
          
          echo "### StatefulSets" >> k8s/INVENTORY.md
          find k8s/charts/templates/statefulsets -name "*.yaml" -exec wc -l {} + | tail -1 >> k8s/INVENTORY.md || echo "0 files" >> k8s/INVENTORY.md
          
          echo "### DaemonSets" >> k8s/INVENTORY.md
          find k8s/charts/templates/daemonsets -name "*.yaml" -exec wc -l {} + | tail -1 >> k8s/INVENTORY.md || echo "0 files" >> k8s/INVENTORY.md
          
          echo "### ConfigMaps" >> k8s/INVENTORY.md
          find k8s/charts/templates/configmaps -name "*.yaml" -exec wc -l {} + | tail -1 >> k8s/INVENTORY.md || echo "0 files" >> k8s/INVENTORY.md
          
          echo "### Secrets" >> k8s/INVENTORY.md
          find k8s/charts/templates/secrets -name "*.yaml" -exec wc -l {} + | tail -1 >> k8s/INVENTORY.md || echo "0 files" >> k8s/INVENTORY.md
          
          echo "### Services" >> k8s/INVENTORY.md
          find k8s/charts/templates/services -name "*.yaml" -exec wc -l {} + | tail -1 >> k8s/INVENTORY.md || echo "0 files" >> k8s/INVENTORY.md
          
          echo "### Ingresses" >> k8s/INVENTORY.md
          find k8s/charts/templates/ingresses -name "*.yaml" -exec wc -l {} + | tail -1 >> k8s/INVENTORY.md || echo "0 files" >> k8s/INVENTORY.md
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if there are changes
          if [[ -z $(git status -s) ]]; then
            echo "No changes to commit"
            exit 0
          fi
          
          git add k8s/
          git commit -m "chore: Export Kubernetes resources - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
