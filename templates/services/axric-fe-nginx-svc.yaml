apiVersion: v1
kind: Service
metadata:
  name: axric-fe-nginx-svc
  namespace: axric
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
    - port: 443
      targetPort: 443
      nodePort: 31376
      protocol: TCP
  sessionAffinity: None
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4