apiVersion: apps/v1
kind: Deployment
metadata:
  name: axric-fe
  namespace: axric
  labels:
    app: axric-fe
spec:
  replicas: 3
  selector:
    matchLabels:
      app: axric-fe
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: axric-fe
    spec:
      containers:
        - name: axric-fe
          image: jaron197/axric-fe:1.0.13
          imagePullPolicy: IfNotPresent
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30