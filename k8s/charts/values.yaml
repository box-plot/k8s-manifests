postgres:
  enabled: true
  name: axric-postgres
  namespace: axric-db
  createNamespace: true
  image: postgres:16.3
  imagePullPolicy: IfNotPresent
  port: 5432
  revisionHistoryLimit: 3
  auth:
    database: axricdb
    username: axricuser
    password: 6u9WLtpk5u
    existingSecret: ""
    secretName: axric-postgres-secret
  persistence:
    enabled: false
    size: 8Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: local-path
  storage:
    mountPath: /var/lib/postgresql/data
    pgdata: /var/lib/postgresql/data/pgdata
  resources: {}
kafka:
  enabled: true
  name: kafka-prod
  namespace: kafka-prod
  createNamespace: true
  replicas: 1
  revisionHistoryLimit: 3
  image: confluentinc/cp-kafka:8.2.1
  imagePullPolicy: IfNotPresent
  port: 9092
  env:
    - name: CLUSTER_ID
      value: MkU3OEVBNTcwNTJENDM2Qk
    - name: KAFKA_NODE_ID
      value: "1"
    - name: KAFKA_PROCESS_ROLES
      value: broker,controller
    - name: KAFKA_CONTROLLER_LISTENER_NAMES
      value: CONTROLLER
    - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
      value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
    - name: KAFKA_LISTENERS
      value: PLAINTEXT://kafka-prod-0.kafka-prod.kafka-prod.svc.cluster.local:29092,CONTROLLER://kafka-prod-0.kafka-prod.kafka-prod.svc.cluster.local:29093,PLAINTEXT_HOST://0.0.0.0:9092
    - name: KAFKA_ADVERTISED_LISTENERS
      value: PLAINTEXT://kafka-prod-0.kafka-prod.kafka-prod.svc.cluster.local:29092,PLAINTEXT_HOST://kafka-prod-0.kafka-prod.kafka-prod.svc.cluster.local:9092
    - name: KAFKA_INTER_BROKER_LISTENER_NAME
      value: PLAINTEXT
    - name: KAFKA_CONTROLLER_QUORUM_VOTERS
      value: 1@kafka-prod-0.kafka-prod.kafka-prod.svc.cluster.local:29093
    - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
      value: "1"
    - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
      value: "1"
    - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
      value: "1"
    - name: KAFKA_LOG_DIRS
      value: /var/lib/kafka/data
  resources: {}
  service:
    enabled: true
    type: ClusterIP
    headless: true
    port: 9092
    targetPort: 9092
  persistence:
    enabled: false
    size: 8Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
  storage:
    mountPath: /var/lib/kafka/data
