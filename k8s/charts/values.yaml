namespace: axric
apps:
  axric-api:
    enabled: true
    name: axric-api
    image: jaron197/axric-api:1.0.41
    replicaCount: 3
    revisionHistoryLimit: 3
    containerPort: 3000
    pullPolicy: IfNotPresent
    strategy: RollingUpdate
    envFrom:
      configMaps:
        - axric-backend-config
      secrets:
        - axric-mail-secret
    resources: {}
    service:
      enabled: true
      type: ClusterIP
      port: 3000
      targetPort: 3000
  axric-fe:
    enabled: true
    name: axric-fe
    image: jaron197/axric-fe:1.0.41
    replicaCount: 1
    revisionHistoryLimit: 3
    containerPort: 80 # FIXED (was 8080)
    pullPolicy: IfNotPresent
    strategy: RollingUpdate
    envFrom:
      configMaps: []
      secrets: []
    resources: {}
    service:
      enabled: true
      type: ClusterIP
      port: 80
      targetPort: 80 # FIXED
ingress:
  enabled: true
  name: axric-ingress
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: axrique.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: axric-fe
          servicePort: 80
  tls: [] # keep empty unless you add cert-manager
configMaps:
  axric-backend-config:
    enabled: true
    data:
      ALLOWED_ORIGIN: https://axrique.com
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: "587"
      SERVER_PORT: "3000"

postgres:
  enabled: true
  name: axric-postgres
  image: postgres:16.3
  imagePullPolicy: IfNotPresent
  port: 5432
  revisionHistoryLimit: 3
  auth:
    database: axric
    username: axric
    password: P@ssw0rd#432
    existingSecret: ""
    secretName: axric-postgres-secret
  persistence:
    enabled: true
    size: 8Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
  storage:
    mountPath: /var/lib/postgresql/data
    pgdata: /var/lib/postgresql/data/pgdata
  resources: {}
serviceAccounts:
  create: false
  items: []
persistence:
  enabled: false
  claims: []
secrets:
  enabled: false
  items: []
