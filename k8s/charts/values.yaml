namespace: axric
apps:
  axric-api:
    enabled: true
    name: axric-api
    image: jaron197/axric-api:1.0.54
    replicaCount: 3
    revisionHistoryLimit: 3
    containerPort: 3000
    pullPolicy: IfNotPresent
    strategy: RollingUpdate
    envFrom:
      configMaps:
        - axric-backend-config
      secrets:
        - axric-mail-secret
    resources: {}
    service:
      enabled: true
      type: ClusterIP
      port: 3000
      targetPort: 3000
  axric-fe:
    enabled: true
    name: axric-fe
    image: jaron197/axric-fe:1.0.54
    replicaCount: 1
    revisionHistoryLimit: 3
    containerPort: 80 # FIXED (was 8080)
    pullPolicy: IfNotPresent
    strategy: RollingUpdate
    envFrom:
      configMaps: []
      secrets: []
    resources: {}
    service:
      enabled: true
      type: ClusterIP
      port: 80
      targetPort: 80 # FIXED
  axricIngress:
    enabled: true
    name: axric-ingress
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - host: axric.co.th
        paths:
          - path: /api/v1
            pathType: Prefix
            serviceName: rekakim-backend
            servicePort: 1080
          - path: /api
            pathType: Prefix
            serviceName: axric-api
            servicePort: 3000
          - path: /
            pathType: Prefix
            serviceName: axric-fe
            servicePort: 80
    tls:
      - hosts:
          - axric.co.th
        secretName: axric-co-th-tls
  rekakimBackend:
    enabled: true
    name: rekakim-backend
    namespace: axric
    image: jaron197/rekakim-backend:1.0.13
    replicaCount: 1
    revisionHistoryLimit: 3
    containerPort: 1080
    pullPolicy: IfNotPresent
    envFrom:
      configMaps:
        - rekakim-backend-config
      secrets:
        - rekakim-backend-secret
    secret:
      enabled: true
      name: rekakim-backend-secret
      stringData:
        PG_USER: "axricuser"
        PG_PASS: "6u9WLtpk5u"
        PG_DB_NAME: "axricdb"
    service:
      enabled: true
      type: ClusterIP
      port: 1080
      targetPort: 1080
    ingress:
      enabled: false
      host: axric.co.th
      path: /api/v1
      tls: true
      tlsSecret: axric-co-th-tls
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env: []
    config: {}
    nodeSelector: {}
  rekakimApp:
    enabled: true
    name: rekakim-app
    image: jaron197/rekakim-app:1.0.8
    replicaCount: 1
    revisionHistoryLimit: 3
    containerPort: 8080
    pullPolicy: IfNotPresent
    strategy: RollingUpdate
    envFrom:
      configMaps: []
      secrets: []
    resources: {}
    service:
      enabled: true
      type: ClusterIP
      port: 80
      targetPort: 8080
    ingress:
      enabled: true
      className: nginx
      host: axric.co.th
      path: /rekakim(/|$)(.*)
      pathType: ImplementationSpecific
      servicePort: 80
      annotations:
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/rewrite-target: /$2
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
