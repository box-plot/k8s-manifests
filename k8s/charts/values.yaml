namespace: axric

export:
  namespaces: "axric"
  exportSecrets: false
  exportClusterRbac: false
  exportCustomResources: false

apps:
  axric-api:
    name: axric-api
    image:
      repository: jaron197/axric-api
      tag: "1.0.40"
    replicaCount: 2
    revisionHistoryLimit: 3
    port: 3000
    pullPolicy: Always
    strategy: RollingUpdate
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    probes:
      liveness:
        path: /health
        initialDelaySeconds: 15
        periodSeconds: 20
      readiness:
        path: /health
        initialDelaySeconds: 5
        periodSeconds: 10

  axric-fe:
    name: axric-fe
    image:
      repository: jaron197/axric-fe
      tag: "1.0.40"
    replicaCount: 3
    revisionHistoryLimit: 3
    port: 8080
    pullPolicy: IfNotPresent
    strategy: RollingUpdate
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
    probes:
      liveness:
        path: /
        initialDelaySeconds: 10
        periodSeconds: 20
      readiness:
        path: /
        initialDelaySeconds: 5
        periodSeconds: 10
