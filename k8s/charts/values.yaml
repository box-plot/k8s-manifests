namespace: axric
apps:
  axric-api:
    enabled: true
    name: axric-api
    image: jaron197/axric-api:1.0.41
    replicaCount: 3
    revisionHistoryLimit: 3
    containerPort: 3000
    pullPolicy: IfNotPresent
    strategy: RollingUpdate
    envFrom:
      configMaps:
        - axric-backend-config
      secrets:
        - axric-mail-secret
    resources: {}
    service:
      enabled: true
      type: ClusterIP
      port: 3000
      targetPort: 3000
  axric-fe:
    enabled: true
    name: axric-fe
    image: jaron197/axric-fe:1.0.41
    replicaCount: 1
    revisionHistoryLimit: 3
    containerPort: 80 # FIXED (was 8080)
    pullPolicy: IfNotPresent
    strategy: RollingUpdate
    envFrom:
      configMaps: []
      secrets: []
    resources: {}
    service:
      enabled: true
      type: ClusterIP
      port: 80
      targetPort: 80 # FIXED
ingress:
  enabled: true
  name: axric-ingress
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: axrique.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: axric-fe
          servicePort: 80
  tls: [] # keep empty unless you add cert-manager
configMaps:
  axric-backend-config:
    enabled: true
    data:
      ALLOWED_ORIGIN: https://axrique.com
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: "587"
      SERVER_PORT: "3000"
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: 43.229.133.190:30092
      KAFKA_CLIENT_ID: axric-api-prod-6e0d9a3f2c7b18e4
      KAFKA_GROUP_ID: axric-group
      KAFKA_CHAT_TOPIC: chat-topic

postgres:
  enabled: true
  name: axric-postgres
  namespace: axric-db
  createNamespace: true
  image: postgres:16.3
  imagePullPolicy: IfNotPresent
  port: 5432
  revisionHistoryLimit: 3
  auth:
    database: axricdb
    username: axricuser
    password: 6u9WLtpk5u
    existingSecret: ""
    secretName: axric-postgres-secret
  persistence:
    enabled: false
    size: 8Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: local-path
  storage:
    mountPath: /var/lib/postgresql/data
    pgdata: /var/lib/postgresql/data/pgdata
  resources: {}
kafka:
  enabled: true
  name: kafka
  namespace: kafka
  createNamespace: true
  replicas: 1
  revisionHistoryLimit: 3
  image: confluentinc/cp-kafka:8.2.1
  imagePullPolicy: IfNotPresent
  port: 9092
  externalPort: 30092
  externalBrokerAddress: 43.229.133.190
  env:
    - name: KAFKA_CFG_BROKER_ID
      value: "1"
    - name: KAFKA_CFG_ADVERTISED_LISTENERS
      value: EXTERNAL://43.229.133.190:30092,INTERNAL://kafka-0.kafka.kafka.svc.cluster.local:9092
    - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
      value: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
    - name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME
      value: INTERNAL
    - name: KAFKA_CFG_LISTENERS
      value: EXTERNAL://0.0.0.0:30092,INTERNAL://0.0.0.0:9092
    - name: KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR
      value: "1"
    - name: KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
      value: "1"
    - name: KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR
      value: "1"
    - name: KAFKA_CFG_LOG_DIRS
      value: /var/lib/kafka/data
  resources: {}
  service:
    enabled: true
    type: NodePort
    headless: false
    port: 9092
    targetPort: 9092
    externalPort: 30092
    externalTargetPort: 30092
  persistence:
    enabled: false
    size: 8Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
  storage:
    mountPath: /var/lib/kafka/data
serviceAccounts:
  create: false
  items: []
persistence:
  enabled: false
  claims: []
secrets:
  enabled: false
  items: []
