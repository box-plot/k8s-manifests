{{- range $name, $cm := .Values.configMaps }}
{{- if and (default true $cm.enabled) (ne $name "rekakim") }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  namespace: {{ include "k8s-export.namespace" $ }}
  labels:
    {{- include "k8s-export.labels" $ | nindent 4 }}
data:
  {{- toYaml $cm.data | nindent 2 }}
{{- end }}
{{- end }}


