{{- if .Values.apps.rekakimBackend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.apps.rekakimBackend.name }}
  namespace: {{ .Values.apps.rekakimBackend.namespace }}
  labels:
    app: {{ .Values.apps.rekakimBackend.name }}
spec:
  type: {{ .Values.apps.rekakimBackend.service.type }}
  ports:
  - port: {{ .Values.apps.rekakimBackend.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.apps.rekakimBackend.name }}
{{- end }}

