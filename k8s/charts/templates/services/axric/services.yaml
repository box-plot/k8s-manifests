{{- range $appName, $app := .Values.apps }}
{{- if and (default true $app.enabled) (ne $appName "rekakimBackend") (hasKey $app "service") (default true $app.service.enabled) (hasKey $app "name") }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $app.name }}
  namespace: {{ include "k8s-export.namespace" $ }}
  labels:
    {{- include "k8s-export.appLabels" (dict "name" $app.name "root" $) | nindent 4 }}
spec:
  type: {{ $app.service.type | default "ClusterIP" }}
  selector:
    app.kubernetes.io/name: {{ $app.name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ $app.service.port | default 80 }}
      targetPort: {{ $app.service.targetPort | default $app.containerPort | default 8080 }}
{{- end }}
{{- end }}

