{{- if .Values.apps.threadlyBackend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.apps.threadlyBackend.name }}
  namespace: {{ .Values.apps.threadlyBackend.namespace }}
  labels:
    app: {{ .Values.apps.threadlyBackend.name }}
    version: {{ .Values.apps.threadlyBackend.version }}
spec:
  replicas: {{ default 1 .Values.apps.threadlyBackend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.apps.threadlyBackend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.apps.threadlyBackend.name }}
        version: {{ .Values.apps.threadlyBackend.version }}
    spec:
      serviceAccountName: {{ .Values.apps.threadlyBackend.name }}
      {{- with .Values.apps.threadlyBackend.image.pullSecrets }}
      imagePullSecrets:
      {{- range . }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
      containers:
      - name: {{ .Values.apps.threadlyBackend.name }}
        image: "{{ .Values.apps.threadlyBackend.image.repository }}:{{ .Values.apps.threadlyBackend.image.tag }}"
        imagePullPolicy: {{ .Values.apps.threadlyBackend.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.apps.threadlyBackend.port }}
          protocol: TCP
        envFrom:
        {{- range .Values.apps.threadlyBackend.envFrom.configMaps }}
        - configMapRef:
            name: {{ . }}
        {{- end }}
        {{- range .Values.apps.threadlyBackend.envFrom.secrets }}
        - secretRef:
            name: {{ . }}
        {{- end }}
        env:
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.apps.threadlyBackend.secret.name | default "threadly-backend-secret" }}
              key: PG_PASSWORD
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.apps.threadlyBackend.secret.name | default "threadly-backend-secret" }}
              key: DB_PASSWORD
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.apps.threadlyBackend.secret.name | default "threadly-backend-secret" }}
              key: DATABASE_PASSWORD
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.apps.threadlyBackend.secret.name | default "threadly-backend-secret" }}
              key: POSTGRES_PASSWORD
        - name: PG_PASS
          valueFrom:
            secretKeyRef:
              name: {{ .Values.apps.threadlyBackend.secret.name | default "threadly-backend-secret" }}
              key: PG_PASS
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: {{ .Values.apps.threadlyBackend.resources.requests.memory }}
            cpu: {{ .Values.apps.threadlyBackend.resources.requests.cpu }}
          limits:
            memory: {{ .Values.apps.threadlyBackend.resources.limits.memory }}
            cpu: {{ .Values.apps.threadlyBackend.resources.limits.cpu }}
        volumeMounts:
        - name: app-config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: app-config
        configMap:
          name: {{ .Values.apps.threadlyBackend.name }}-config
      {{- with .Values.apps.threadlyBackend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
