{{- range $appName, $app := .Values.apps }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $app.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $app.name }}
    release: {{ $.Release.Name }}
    heritage: {{ $.Release.Service }}
    {{- if $app.image }}
    version: {{ $app.image | regexFind "[0-9]+\\.[0-9]+\\.[0-9]+" | quote }}
    {{- end }}
spec:
  replicas: {{ $app.replicaCount }}
  revisionHistoryLimit: {{ $app.revisionHistoryLimit | default 2 }}
  selector:
    matchLabels:
      app: {{ $app.name }}
      release: {{ $.Release.Name }}
  strategy:
    type: {{ $app.strategy.type | default "RollingUpdate" }}
    {{- if $app.strategy.rollingUpdate }}
    rollingUpdate:
{{ toYaml $app.strategy.rollingUpdate | indent 6 }}
    {{- end }}
  template:
    metadata:
      labels:
        app: {{ $app.name }}
        release: {{ $.Release.Name }}
        {{- if $app.image }}
        version: {{ $app.image | regexFind "[0-9]+\\.[0-9]+\\.[0-9]+" | quote }}
        {{- end }}
      {{- with $app.podAnnotations }}
      annotations:
{{ toYaml . | indent 8 }}
      {{- end }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: {{ $app.name }}
          image: {{ $app.image | quote }}
          imagePullPolicy: {{ $app.pullPolicy | default "IfNotPresent" }}
          {{- with $app.env }}
          env:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with $app.envFrom }}
          envFrom:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with $app.volumeMounts }}
          volumeMounts:
{{ toYaml . | indent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $app.port }}
              protocol: TCP
          {{- with $app.livenessProbe }}
          livenessProbe:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with $app.readinessProbe }}
          readinessProbe:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with $app.resources }}
          resources:
{{ toYaml . | indent 12 }}
          {{- end }}
      {{- with $app.volumes }}
      volumes:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with $app.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with $app.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with $app.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
---
{{- end }}

