{{- if .Values.apps.rekakimBackend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.apps.rekakimBackend.name }}
  namespace: {{ .Values.apps.rekakimBackend.namespace }}
  labels:
    app: {{ .Values.apps.rekakimBackend.name }}
    version: {{ .Values.apps.rekakimBackend.version }}
spec:
  replicas: {{ default 1 .Values.apps.rekakimBackend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.apps.rekakimBackend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.apps.rekakimBackend.name }}
        version: {{ .Values.apps.rekakimBackend.version }}
    spec:
      serviceAccountName: {{ .Values.apps.rekakimBackend.name }}
      containers:
      - name: {{ .Values.apps.rekakimBackend.name }}
        image: {{ .Values.apps.rekakimBackend.image }}
        imagePullPolicy: {{ .Values.apps.rekakimBackend.pullPolicy | default "IfNotPresent" }}
        ports:
        - name: http
          containerPort: {{ .Values.apps.rekakimBackend.containerPort | default 1080 }}
          protocol: TCP
        envFrom:
        {{- range .Values.apps.rekakimBackend.envFrom.configMaps }}
        - configMapRef:
            name: {{ . }}
        {{- end }}
        {{- range .Values.apps.rekakimBackend.envFrom.secrets }}
        - secretRef:
            name: {{ . }}
          optional: true
        {{- end }}
        startupProbe:
          exec:
            command:
            - node
            - -e
            - "const net=require('net');const p=Number(process.env.PORT||1080);const s=net.createConnection({host:'127.0.0.1',port:p},()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 60
        livenessProbe:
          exec:
            command:
            - node
            - -e
            - "const net=require('net');const p=Number(process.env.PORT||1080);const s=net.createConnection({host:'127.0.0.1',port:p},()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
            - node
            - -e
            - "const net=require('net');const p=Number(process.env.PORT||1080);const s=net.createConnection({host:'127.0.0.1',port:p},()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 6
        resources:
          requests:
            memory: {{ .Values.apps.rekakimBackend.resources.requests.memory }}
            cpu: {{ .Values.apps.rekakimBackend.resources.requests.cpu }}
          limits:
            memory: {{ .Values.apps.rekakimBackend.resources.limits.memory }}
            cpu: {{ .Values.apps.rekakimBackend.resources.limits.cpu }}
        volumeMounts:
        - name: app-config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: app-config
        configMap:
          name: {{ .Values.apps.rekakimBackend.name }}-config
      {{- with .Values.apps.rekakimBackend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

