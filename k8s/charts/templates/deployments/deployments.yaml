{{- range $appName, $app := .Values.apps }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $app.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $appName }}
spec:
  replicas: {{ $app.replicaCount }}
  revisionHistoryLimit: {{ $app.revisionHistoryLimit | default 3 }}
  selector:
    matchLabels:
      app: {{ $appName }}
  strategy:
    type: {{ $app.strategy | default "RollingUpdate" }}
    {{- if eq ($app.strategy | default "RollingUpdate") "RollingUpdate" }}
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- end }}
  template:
    metadata:
      labels:
        app: {{ $appName }}
    spec:
      containers:
      - name: {{ $appName }}
        image: {{ $app.image.repository }}:{{ $app.image.tag }}
        imagePullPolicy: {{ $app.pullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: {{ $app.port | default 8080 }}
        {{- if $app.envFrom }}
        envFrom:
        {{- range $app.envFrom }}
        - configMapRef:
            name: {{ .name }}
        {{- end }}
        {{- end }}
        {{- if $app.probes }}
        {{- if $app.probes.liveness }}
        livenessProbe:
          httpGet:
            path: {{ $app.probes.liveness.path }}
            port: {{ $app.port }}
          initialDelaySeconds: {{ $app.probes.liveness.initialDelaySeconds | default 15 }}
          periodSeconds: {{ $app.probes.liveness.periodSeconds | default 20 }}
        {{- end }}
        {{- if $app.probes.readiness }}
        readinessProbe:
          httpGet:
            path: {{ $app.probes.readiness.path }}
            port: {{ $app.port }}
          initialDelaySeconds: {{ $app.probes.readiness.initialDelaySeconds | default 5 }}
          periodSeconds: {{ $app.probes.readiness.periodSeconds | default 10 }}
        {{- end }}
        {{- end }}
        {{- if $app.resources }}
        resources:
          {{- if $app.resources.requests }}
          requests:
            cpu: {{ $app.resources.requests.cpu }}
            memory: {{ $app.resources.requests.memory }}
          {{- end }}
          {{- if $app.resources.limits }}
          limits:
            cpu: {{ $app.resources.limits.cpu }}
            memory: {{ $app.resources.limits.memory }}
          {{- end }}
        {{- end }}
{{- end }}
