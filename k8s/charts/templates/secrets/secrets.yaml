{{- if .Values.secrets.enabled }}
{{- range .Values.secrets.items }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name }}
  namespace: {{ include "k8s-export.namespace" $ }}
  labels:
    {{- include "k8s-export.labels" $ | nindent 4 }}
type: {{ .type | default "Opaque" }}
{{- if .stringData }}
stringData:
  {{- toYaml .stringData | nindent 2 }}
{{- else if .data }}
data:
  {{- toYaml .data | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
