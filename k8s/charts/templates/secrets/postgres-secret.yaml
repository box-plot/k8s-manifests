{{- if and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-export.postgresSecretName" . }}
  namespace: {{ include "k8s-export.postgresNamespace" . }}
  labels:
    {{- include "k8s-export.appLabels" (dict "name" .Values.postgres.name "root" . "component" "database") | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
{{- end }}